name: CI

on:
  push:
    branches: [main, "fix/**", "chore/**", "feat/**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Bandit (SAST)
        run: bandit -r app -c pyproject.toml
      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt || true  # report-only initially
      - name: Semgrep (SAST)
        run: semgrep --config auto app || true       # report-only initially
      - name: Pytest (unit)
        # Les tests `integration` (Postgres/Keycloak/serveur/navigateur live)
        # ne tournent pas sur le runner CI sans infra — lancés à la demande.
        run: pytest -m "not integration"
