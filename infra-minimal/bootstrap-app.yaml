---
apiVersion: v1
kind: Service
metadata:
  name: device-management
  namespace: bootstrap
spec:
  selector:
    app: device-management
  ports:
    - name: http
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: device-management
  namespace: bootstrap
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bootstrap.fake-domain.name
      secretName: bootstrap-tls
  rules:
    - host: bootstrap.fake-domain.name
      http:
        paths:
          - path: /relay-assistant
            pathType: Prefix
            backend:
              service:
                name: relay-assistant
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: device-management
                port:
                  number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-assistant-nginx
  namespace: bootstrap
data:
  default.conf.template: |
    server {
      listen 8080;
      server_name _;

      proxy_ssl_server_name on;
      proxy_http_version 1.1;

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location = /__relay_auth {
        internal;
        proxy_pass http://device-management:3001/relay/authorize;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Relay-Client $http_x_relay_client;
        proxy_set_header X-Relay-Key $http_x_relay_key;
        proxy_set_header X-Relay-Proxy-Token ${RELAY_PROXY_SHARED_TOKEN};
        proxy_set_header X-Relay-Target $relay_target;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URI $request_uri;
      }

      location ~ ^/keycloak/protocol/openid-connect/(auth|token|userinfo)$ {
        set $relay_target keycloak;
        auth_request /__relay_auth;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header User-Agent $http_user_agent;
        proxy_pass ${RELAY_KEYCLOAK_UPSTREAM}/protocol/openid-connect/$1$is_args$args;
      }

      location ~ ^/llm/(.+)$ {
        set $relay_target llm;
        auth_request /__relay_auth;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header User-Agent $http_user_agent;
        proxy_pass ${RELAY_LLM_UPSTREAM}/$1$is_args$args;
      }

      location ~ ^/mcr-api/(.+)$ {
        set $relay_target mcr-api;
        auth_request /__relay_auth;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header User-Agent $http_user_agent;
        proxy_pass ${RELAY_MCR_API_UPSTREAM}/$1$is_args$args;
      }

      location / {
        return 404;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-assistant
  namespace: bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay-assistant
  template:
    metadata:
      labels:
        app: relay-assistant
    spec:
      containers:
        - name: relay-assistant
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: RELAY_PROXY_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_PROXY_SHARED_TOKEN
            - name: RELAY_KEYCLOAK_UPSTREAM
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: RELAY_KEYCLOAK_UPSTREAM
            - name: RELAY_LLM_UPSTREAM
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: RELAY_LLM_UPSTREAM
            - name: RELAY_MCR_API_UPSTREAM
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: RELAY_MCR_API_UPSTREAM
          volumeMounts:
            - name: nginx-template
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: nginx-template
          configMap:
            name: relay-assistant-nginx
            items:
              - key: default.conf.template
                path: default.conf.template
---
apiVersion: v1
kind: Service
metadata:
  name: relay-assistant
  namespace: bootstrap
spec:
  selector:
    app: relay-assistant
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
