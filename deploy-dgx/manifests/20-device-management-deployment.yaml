apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-management
  namespace: bootstrap
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: device-management
  template:
    metadata:
      labels:
        app: device-management
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: device-management
          image: rg.fr-par.scw.cloud/funcscwnspricelessmontalcinhiacgnzi/device-management:0.0.5-unified-relay
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DM_APP_ENV
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_APP_ENV
            - name: DM_CONFIG_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_CONFIG_ENABLED
            - name: DM_CONFIG_PROFILE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_CONFIG_PROFILE
            - name: DM_ENROLL_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_ENROLL_URL
            - name: DM_ALLOW_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_ALLOW_ORIGINS
            - name: DM_MAX_BODY_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_MAX_BODY_SIZE_MB
            - name: DM_PORT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_PORT
            - name: DM_UVICORN_WORKERS
              value: "2"
            - name: DM_UVICORN_ACCESS_LOG
              value: "false"
            - name: DM_UVICORN_TIMEOUT_KEEP_ALIVE
              value: "15"
            - name: DM_RUNTIME_MODE
              value: "api"
            - name: DM_QUEUE_ENABLED
              value: "true"
            - name: DM_QUEUE_BATCH_SIZE
              value: "50"
            - name: DM_QUEUE_POLL_INTERVAL_SECONDS
              value: "0.5"
            - name: DM_QUEUE_LOCK_TTL_SECONDS
              value: "60"
            - name: DM_QUEUE_DEFAULT_MAX_ATTEMPTS
              value: "8"
            - name: DM_QUEUE_RETRY_BASE_SECONDS
              value: "2"
            - name: DM_QUEUE_RETRY_MAX_SECONDS
              value: "300"
            - name: DM_QUEUE_RETRY_JITTER_SECONDS
              value: "1.0"
            - name: DM_METRICS_ENABLED
              value: "true"
            - name: DM_STORE_ENROLL_LOCALLY
              value: "false"
            - name: DM_ENROLL_DIR
              value: /tmp/enroll
            - name: DM_RELAY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_ENABLED
            - name: DM_RELAY_KEY_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_KEY_TTL_SECONDS
            - name: DM_RELAY_ALLOWED_TARGETS_CSV
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_ALLOWED_TARGETS_CSV
            - name: DM_RELAY_REQUIRE_KEY_FOR_SECRETS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_REQUIRE_KEY_FOR_SECRETS
            - name: DM_RELAY_PROXY_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_PROXY_SHARED_TOKEN
            - name: DM_RELAY_SECRET_PEPPER
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_SECRET_PEPPER
            - name: DM_CONFIG_DIR
              value: /app/config
            - name: DM_LOCAL_BINARIES_DIR
              value: /app/config/binaries
            - name: PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: PUBLIC_BASE_URL
            - name: MODELNAME1
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: MODELNAME1
            - name: MODELNAME2
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: MODELNAME2
            - name: MODELNAME3
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: MODELNAME3
            - name: TOKENMODEL1
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: TOKENMODEL1
            - name: KEYCLOAK_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_ISSUER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_REDIRECT_URI
            - name: KEYCLOAK_ALLOWED_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_ALLOWED_REDIRECT_URI
            - name: TELEMETRY_SALT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: TELEMETRY_SALT
            - name: TELEMETRY_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: TELEMETRY_KEY
            - name: DM_TELEMETRY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_ENABLED
            - name: DM_TELEMETRY_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_PUBLIC_ENDPOINT
            - name: DM_TELEMETRY_AUTHORIZATION_TYPE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_AUTHORIZATION_TYPE
            - name: DM_TELEMETRY_UPSTREAM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_ENDPOINT
            - name: DM_TELEMETRY_UPSTREAM_AUTH_TYPE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_AUTH_TYPE
            - name: DM_TELEMETRY_UPSTREAM_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_KEY
            - name: DM_TELEMETRY_TOKEN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_TOKEN_TTL_SECONDS
            - name: DM_TELEMETRY_TOKEN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_TOKEN_SIGNING_KEY
            - name: DM_TELEMETRY_REQUIRE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_REQUIRE_TOKEN
            - name: DM_TELEMETRY_MAX_BODY_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_MAX_BODY_SIZE_MB
            - name: DM_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_ENDPOINT_URL
            - name: DM_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_BUCKET
            - name: DM_S3_PREFIX_ENROLL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_PREFIX_ENROLL
            - name: DM_S3_PREFIX_BINARIES
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_PREFIX_BINARIES
            - name: DM_BINARIES_MODE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_BINARIES_MODE
            - name: DM_PRESIGN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_PRESIGN_TTL_SECONDS
            - name: DM_STORE_ENROLL_S3
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_STORE_ENROLL_S3
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SESSION_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_URL
            - name: DATABASE_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_ADMIN_URL
          volumeMounts:
            - name: config-all
              mountPath: /app/config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /livez
              port: 3001
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config-all
          projected:
            sources:
              - configMap:
                  name: device-management-config
                  items:
                    - key: config.json
                      path: config.json
                    - key: matisse-config.json
                      path: matisse/config.json
                    - key: libreoffice-config.json
                      path: libreoffice/config.json
                    - key: chrome-config.json
                      path: chrome/config.json
                    - key: edge-config.json
                      path: edge/config.json
                    - key: firefox-config.json
                      path: firefox/config.json
                    - key: misc-config.json
                      path: misc/config.json
