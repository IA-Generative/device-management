# DGX deployment settings (simple YAML: one key/value per line)
namespace: bootstrap

gateway_name: api-gateway
gateway_namespace: envoy-gateway-system
hostname: <DGX_HOSTNAME>

app_path_prefix: /bootstrap
adminer_path_prefix: /adminer
filebrowser_path_prefix: /files
telemetry_path_prefix: /telemetry

public_base_url: https://<DGX_HOSTNAME>/bootstrap
keycloak_issuer_url: https://<SSO_HOSTNAME>/
keycloak_realm: mirai

dm_store_enroll_s3: "false"
dm_binaries_mode: local
