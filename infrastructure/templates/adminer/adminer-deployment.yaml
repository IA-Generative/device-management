{{- if .Values.adminer.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  labels:
    {{- include "device-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "device-management.name" . }}
      app.kubernetes.io/component: adminer
  template:
    metadata:
      labels:
        {{- include "device-management.labels" . | nindent 8 }}
        app.kubernetes.io/component: adminer
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: adminer
          image: docker.io/library/adminer:4.8.1-standalone
          imagePullPolicy: {{ .Values.adminer.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.adminer.service.port }}
          {{- if .Values.adminer.resources }}
          resources:
            {{- toYaml .Values.adminer.resources | nindent 12 }}
          {{- end }}
{{- end }}