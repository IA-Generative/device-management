{{- if .Values.filebrowser.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: filebrowser-users-init
  labels:
    {{- include "device-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: filebrowser
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: init-users
          image: docker.io/filebrowser/filebrowser:v2.31.2
          imagePullPolicy: {{ .Values.filebrowser.imagePullPolicy }}
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              DB="/database/filebrowser.db"
              mkdir -p /database

              add_user() {
                user="$1"
                pass="$2"
                if [ -z "$pass" ]; then
                  echo "Skipping $user (empty password)."
                  return 0
                fi
                /filebrowser users add "$user" "$pass" --perm.admin -d "$DB" >/dev/null 2>&1 || true
                echo "Ensured filebrowser account: $user"
              }

              add_user "editor1"  "${EDITOR1_PASSWORD:-}"
              add_user "editor2"  "${EDITOR2_PASSWORD:-}"
              add_user "editor3"  "${EDITOR3_PASSWORD:-}"
              add_user "editor4"  "${EDITOR4_PASSWORD:-}"
              add_user "editor5"  "${EDITOR5_PASSWORD:-}"
              add_user "editor6"  "${EDITOR6_PASSWORD:-}"
              add_user "editor7"  "${EDITOR7_PASSWORD:-}"
              add_user "editor8"  "${EDITOR8_PASSWORD:-}"
              add_user "editor9"  "${EDITOR9_PASSWORD:-}"
              add_user "editor10" "${EDITOR10_PASSWORD:-}"
          envFrom:
            - secretRef:
                name: {{ include "device-management.name" . }}-filebrowser-config
          volumeMounts:
            - name: db
              mountPath: /database
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: {{ include "device-management.name" . }}-filebrowser-db
{{- end }}