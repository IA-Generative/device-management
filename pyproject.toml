[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# E/F: pyflakes+pycodestyle, B: bugbear, UP: pyupgrade, I: isort.
# Security (bandit-style "S") is owned by the dedicated Bandit job below
# (its own config/skips) — running both duplicates findings with conflicting
# suppression syntaxes (# noqa vs # nosec), so we keep a single SAST source.
select = ["E", "F", "B", "UP", "I"]
ignore = [
    "E501",   # line length handled by formatter, not blocking
    "B008",   # FastAPI uses callables in defaults (Depends/Form)
]

[tool.bandit]
# Bandit est la source unique de SAST (cf. [tool.ruff.lint]).
# Règles désactivées, chacune auditée le 2026-06-28 :
#   B101 — asserts (hors prod, pattern de tests).
#   B110 — try/except/pass : blocs best-effort (sondes, télémétrie, cleanup)
#          dont l'échec est non-fatal par conception ; sévérité LOW.
#   B310 — urllib.urlopen : n'est appelé que sur des URLs de services
#          configurées par l'opérateur (OIDC/Keycloak/relay/LLM via env),
#          jamais sur une entrée requête. Le fetch exposé à l'utilisateur
#          (readme_url du wizard) passe par validate_public_url + httpx.
#   B608 — SQL dynamique : les 13 sites n'interpolent que des identifiants
#          contrôlés par le code (allowlists de colonnes, noms de pg_tables) ;
#          toutes les VALEURS passent par des paramètres %s. Pas d'entrée
#          utilisateur dans la structure des requêtes.
# Les findings restants (secrets, bind, hash, XML, shell) sont traités par
# vrai correctif ou # nosec inline justifié.
skips = ["B101", "B110", "B310", "B608"]
exclude_dirs = ["tests", "alembic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]          # rend le package `app` importable (collecte CI)
markers = [
    "integration: nécessite une infra live (Postgres/Keycloak/serveur/navigateur) ; exclu du gate CI unitaire via `pytest -m 'not integration'`",
]
