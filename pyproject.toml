[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# E/F: pyflakes+pycodestyle, B: bugbear, S: bandit-style, UP: pyupgrade.
select = ["E", "F", "B", "S", "UP", "I"]
ignore = [
    "E501",   # line length handled by formatter, not blocking
    "B008",   # FastAPI uses callables in defaults (Depends/Form)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # asserts are expected in tests

[tool.bandit]
# Skip asserts (B101) project-wide; the security-sensitive checks remain on.
skips = ["B101"]
exclude_dirs = ["tests", "alembic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
