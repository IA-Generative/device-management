[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# E/F: pyflakes+pycodestyle, B: bugbear, UP: pyupgrade, I: isort.
# SAST (S/bandit-style) is owned by the dedicated Bandit step, not duplicated here.
select = ["E", "F", "B", "UP", "I"]
ignore = [
    "E501",   # line length handled by formatter, not blocking
    "B008",   # FastAPI uses callables in defaults (Depends/Form)
]

[tool.bandit]
# Skip asserts (B101) project-wide; the security-sensitive checks remain on.
skips = ["B101"]
exclude_dirs = ["tests", "alembic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]
