{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "device-management.secretName" . }}
  labels:
    {{- include "device-management.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
# Only truly sensitive keys belong here (cf. app/services/crypto.py
# SENSITIVE_ENV_VARS) — non-secret config lives in the ConfigMap instead.
# In production, prefer setting `secrets.existingSecret` to a Secret managed
# outside Helm (external-secrets, sealed-secrets, manual apply) rather than
# letting Helm own real credentials in its release state.
stringData:
  {{- range $key, $value := .Values.secrets.values }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
