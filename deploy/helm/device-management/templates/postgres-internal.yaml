{{- if .Values.postgres.internal.enabled }}
{{- if .Values.postgres.internal.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "device-management.componentName" (dict "root" . "component" "postgres") }}
  labels:
    {{- include "device-management.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.postgres.internal.persistence.accessModes | nindent 4 }}
  {{- with .Values.postgres.internal.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.internal.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "device-management.componentName" (dict "root" . "component" "postgres") }}
  labels:
    {{- include "device-management.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "device-management.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "device-management.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.internal.image.repository }}:{{ .Values.postgres.internal.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "device-management.configMapName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "device-management.configMapName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "device-management.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.config.postgres.user | quote }}]
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.config.postgres.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.internal.resources | nindent 12 }}
      volumes:
        - name: postgres-data
          {{- if .Values.postgres.internal.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "device-management.componentName" (dict "root" . "component" "postgres") }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "device-management.componentName" (dict "root" . "component" "postgres") }}
  labels:
    {{- include "device-management.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "device-management.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
