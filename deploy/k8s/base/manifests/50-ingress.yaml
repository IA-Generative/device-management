apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: device-management-ingress
  namespace: bootstrap
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Le callback OIDC admin renvoie un gros Set-Cookie (session + id_token) :
    # augmenter le buffer de réponse nginx sinon l'ingress renvoie 502 (cf. /admin/callback).
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    # SSE du proxy LLM (/llm/v1/chat/completions stream) : ne pas bufferiser la
    # réponse et laisser vivre les streams longs (défaut nginx 60s → coupures).
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - <SCALEWAY_HOSTNAME>
      secretName: bootstrap-tls
  rules:
    - host: <SCALEWAY_HOSTNAME>
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: device-management-admin
                port:
                  number: 80
          - path: /telemetry/v1
            pathType: Prefix
            backend:
              service:
                name: telemetry-relay
                port:
                  number: 80
          - path: /llm
            pathType: Prefix
            backend:
              service:
                name: llm-proxy
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: device-management
                port:
                  number: 80
