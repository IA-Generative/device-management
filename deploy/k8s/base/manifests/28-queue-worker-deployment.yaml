apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: bootstrap
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: queue-worker
          image: rg.fr-par.scw.cloud/funcscwnspricelessmontalcinhiacgnzi/device-management:0.2.1-config-cleanup
          imagePullPolicy: Always
          command:
            - python
            - -m
            - app.worker_main
          env:
            - name: DM_RUNTIME_MODE
              value: "worker"
            - name: DM_QUEUE_ENABLED
              value: "true"
            - name: DM_QUEUE_BATCH_SIZE
              value: "100"
            - name: DM_QUEUE_POLL_INTERVAL_SECONDS
              value: "0.5"
            - name: DM_QUEUE_LOCK_TTL_SECONDS
              value: "60"
            - name: DM_QUEUE_DEFAULT_MAX_ATTEMPTS
              value: "8"
            - name: DM_QUEUE_RETRY_BASE_SECONDS
              value: "2"
            - name: DM_QUEUE_RETRY_MAX_SECONDS
              value: "300"
            - name: DM_QUEUE_RETRY_JITTER_SECONDS
              value: "1.0"
            - name: DM_STORE_ENROLL_LOCALLY
              value: "false"
            - name: DM_ENROLL_DIR
              value: /tmp/enroll
            - name: DM_STORE_ENROLL_S3
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_STORE_ENROLL_S3
            - name: DM_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_BUCKET
            - name: DM_S3_PREFIX_ENROLL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_PREFIX_ENROLL
            - name: DM_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_ENDPOINT_URL
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SESSION_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_URL
            - name: DATABASE_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_ADMIN_URL
          resources:
            requests:
              cpu: 300m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
