apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-relay
  namespace: bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-relay
  template:
    metadata:
      labels:
        app: telemetry-relay
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: telemetry-relay
          image: rg.fr-par.scw.cloud/funcscwnspricelessmontalcinhiacgnzi/device-management:0.5.12
          imagePullPolicy: Always
          command:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "3001"
          ports:
            - containerPort: 3001
          env:
            - name: DM_ALLOW_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_ALLOW_ORIGINS
            - name: DM_PORT
              value: "3001"
            - name: DM_CONFIG_ENABLED
              value: "false"
            - name: DM_STORE_ENROLL_LOCALLY
              value: "false"
            - name: DM_STORE_ENROLL_S3
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_URL
            - name: DM_TELEMETRY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_ENABLED
            - name: DM_TELEMETRY_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_PUBLIC_ENDPOINT
            - name: DM_TELEMETRY_AUTHORIZATION_TYPE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_AUTHORIZATION_TYPE
            - name: DM_TELEMETRY_UPSTREAM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_ENDPOINT
            - name: DM_TELEMETRY_UPSTREAM_AUTH_TYPE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_AUTH_TYPE
            - name: DM_TELEMETRY_UPSTREAM_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_KEY
            - name: DM_TELEMETRY_TOKEN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_TOKEN_TTL_SECONDS
            - name: DM_TELEMETRY_TOKEN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_TOKEN_SIGNING_KEY
            - name: DM_TELEMETRY_REQUIRE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_REQUIRE_TOKEN
            - name: DM_TELEMETRY_MAX_BODY_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_MAX_BODY_SIZE_MB
          startupProbe:
            httpGet:
              path: /livez
              port: 3001
            periodSeconds: 2
            failureThreshold: 8
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /livez
              port: 3001
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
