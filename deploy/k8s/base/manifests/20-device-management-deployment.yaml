            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SESSION_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_URL
            - name: DATABASE_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_ADMIN_URL
            - name: DM_TELEMETRY_GRAFANA_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_GRAFANA_URL
            - name: DM_RELAY_ASSISTANT_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_ASSISTANT_URL
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /livez
              port: 3001
            periodSeconds: 2
            failureThreshold: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /livez
              port: 3001
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
      # Plugin configs are now stored in the database (plugins.config_template).
      # The projected ConfigMap volume was removed.
