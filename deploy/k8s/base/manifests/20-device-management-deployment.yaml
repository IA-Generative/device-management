apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-management
  namespace: bootstrap
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: device-management
  template:
    metadata:
      labels:
        app: device-management
    spec:
      # Non-root enforcement : garde-fou complémentaire au USER 10001 du Dockerfile.
      # Si un futur build régresse (image rebasculée root), kubelet refusera de
      # créer le container plutôt que de laisser passer silencieusement. fsGroup
      # 10001 rend les volumes montés (PVC, emptyDir) accessibles en écriture à
      # l'utilisateur de l'image.
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      imagePullSecrets:
        - name: regcred
      containers:
        - name: device-management
          image: <SCALEWAY_REGISTRY>/device-management:0.5.15
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DM_APP_ENV
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_APP_ENV
            - name: DM_CONFIG_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_CONFIG_ENABLED
            - name: DM_CONFIG_PROFILE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_CONFIG_PROFILE
            - name: DM_ENROLL_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_ENROLL_URL
            - name: DM_ALLOW_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_ALLOW_ORIGINS
            - name: DM_MAX_BODY_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_MAX_BODY_SIZE_MB
            - name: DM_PORT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_PORT
            - name: DM_UVICORN_WORKERS
              value: "4"
            - name: DM_UVICORN_ACCESS_LOG
              value: "false"
            - name: DM_UVICORN_TIMEOUT_KEEP_ALIVE
              value: "15"
            - name: DM_RUNTIME_MODE
              value: "api"
            # Runtime config overrides (cross-pod) — pod identity + master key.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DM_APP_VERSION
              value: "0.9.0"
            - name: DM_CONFIG_POLL_INTERVAL_SECONDS
              value: "3"
            - name: DM_RUNTIME_CONFIG_EDITABLE
              value: "true"
            - name: DM_CONFIG_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_CONFIG_SECRET_KEY
                  optional: true
            - name: DM_QUEUE_ENABLED
              value: "true"
            - name: DM_QUEUE_BATCH_SIZE
              value: "50"
            - name: DM_QUEUE_POLL_INTERVAL_SECONDS
              value: "0.5"
            - name: DM_QUEUE_LOCK_TTL_SECONDS
              value: "60"
            - name: DM_QUEUE_DEFAULT_MAX_ATTEMPTS
              value: "8"
            - name: DM_QUEUE_RETRY_BASE_SECONDS
              value: "2"
            - name: DM_QUEUE_RETRY_MAX_SECONDS
              value: "300"
            - name: DM_QUEUE_RETRY_JITTER_SECONDS
              value: "1.0"
            - name: DM_QUEUE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_QUEUE_ADMIN_TOKEN
            - name: DM_METRICS_ENABLED
              value: "true"
            - name: DM_STORE_ENROLL_LOCALLY
              value: "false"
            - name: DM_ENROLL_DIR
              value: /tmp/enroll
            - name: DM_RELAY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_ENABLED
            - name: DM_RELAY_KEY_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_KEY_TTL_SECONDS
            - name: DM_RELAY_ALLOWED_TARGETS_CSV
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_ALLOWED_TARGETS_CSV
            - name: DM_RELAY_REQUIRE_KEY_FOR_SECRETS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_REQUIRE_KEY_FOR_SECRETS
            - name: DM_RELAY_PROXY_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_PROXY_SHARED_TOKEN
            - name: DM_RELAY_SECRET_PEPPER
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_SECRET_PEPPER
            - name: PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: PUBLIC_BASE_URL
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: LLM_BASE_URL
            - name: LLM_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: LLM_API_TOKEN
            - name: DEFAULT_MODEL_NAME
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DEFAULT_MODEL_NAME
            # Modèle d'embeddings (RAG) — optional: embedder facultatif, une clé
            # absente/vide ne doit pas empêcher le pod de démarrer.
            - name: EMBD_MODEL_NAME
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: EMBD_MODEL_NAME
                  optional: true
            - name: ADMIN_REQUIRED_GROUP
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: ADMIN_REQUIRED_GROUP
            - name: ADMIN_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: ADMIN_OIDC_ISSUER_URL
            - name: ADMIN_OIDC_PUBLIC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: ADMIN_OIDC_PUBLIC_ISSUER_URL
            - name: KEYCLOAK_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_ISSUER_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_REDIRECT_URI
            - name: KEYCLOAK_ALLOWED_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: KEYCLOAK_ALLOWED_REDIRECT_URI
            # Upstream Keycloak du relais token WAF-safe (POST /auth/token) et de
            # /relay-assistant/keycloak/* servis par l'API — sans cette clé le
            # renouvellement de refresh token via /auth/token répond 503.
            # `optional`: tolère un Secret antérieur (le relais est alors indisponible,
            # pas le pod).
            - name: RELAY_KEYCLOAK_UPSTREAM
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: RELAY_KEYCLOAK_UPSTREAM
                  optional: true
            # true (envs prod-like/WAF) : la config servie aux plugins pointe
            # keycloakTokenEndpoint sur {PUBLIC_BASE_URL}/auth/token et userinfo
            # sur /relay-assistant/keycloak/… `optional`: absent du secret = false.
            - name: DM_RELAY_FORCE_KEYCLOAK_ENDPOINTS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_FORCE_KEYCLOAK_ENDPOINTS
                  optional: true
            - name: DM_AUTH_VERIFY_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_AUTH_VERIFY_ACCESS_TOKEN
            - name: DM_AUTH_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_AUTH_JWKS_URL
            - name: DM_AUTH_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_AUTH_AUDIENCE
            - name: DM_AUTH_ALLOWED_ALGORITHMS_CSV
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_AUTH_ALLOWED_ALGORITHMS_CSV
            - name: DM_AUTH_LEEWAY_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_AUTH_LEEWAY_SECONDS
            - name: DM_AUTH_JWKS_CACHE_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_AUTH_JWKS_CACHE_TTL_SECONDS
            - name: TELEMETRY_SALT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: TELEMETRY_SALT
            - name: TELEMETRY_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: TELEMETRY_KEY
            # Tokens du template extension (DM-2) — optional: la clé peut être absente
            # du secret tant qu'ops n'a pas posé la vraie valeur (sinon le pod ne démarre pas).
            - name: API_BASE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: API_BASE
                  optional: true
            - name: RELAY_ASSISTANT_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: RELAY_ASSISTANT_BASE_URL
                  optional: true
            - name: COMPTE_RENDU_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: COMPTE_RENDU_URL
                  optional: true
            - name: COMU_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: COMU_URL
                  optional: true
            - name: TELEMETRY_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: TELEMETRY_ENDPOINT
                  optional: true
            - name: DM_TELEMETRY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_ENABLED
            - name: DM_TELEMETRY_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_PUBLIC_ENDPOINT
            - name: DM_TELEMETRY_AUTHORIZATION_TYPE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_AUTHORIZATION_TYPE
            - name: DM_TELEMETRY_UPSTREAM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_ENDPOINT
            - name: DM_TELEMETRY_UPSTREAM_AUTH_TYPE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_AUTH_TYPE
            - name: DM_TELEMETRY_UPSTREAM_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_UPSTREAM_KEY
            - name: DM_TELEMETRY_TOKEN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_TOKEN_TTL_SECONDS
            - name: DM_TELEMETRY_TOKEN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_TOKEN_SIGNING_KEY
            # Proxy LLM : signature des llmToken mintés dans /config (0.9.0+).
            - name: DM_LLM_TOKEN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_LLM_TOKEN_SIGNING_KEY
                  optional: true
            - name: DM_TELEMETRY_REQUIRE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_REQUIRE_TOKEN
            - name: DM_TELEMETRY_MAX_BODY_SIZE_MB
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_MAX_BODY_SIZE_MB
            - name: DM_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_ENDPOINT_URL
            - name: DM_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_BUCKET
            - name: DM_S3_PREFIX_ENROLL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_PREFIX_ENROLL
            - name: DM_S3_PREFIX_BINARIES
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_S3_PREFIX_BINARIES
            - name: DM_BINARIES_MODE
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_BINARIES_MODE
            - name: DM_PRESIGN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_PRESIGN_TTL_SECONDS
            - name: DM_STORE_ENROLL_S3
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_STORE_ENROLL_S3
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: AWS_SESSION_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_URL
            - name: DATABASE_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DATABASE_ADMIN_URL
            - name: DM_TELEMETRY_GRAFANA_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_TELEMETRY_GRAFANA_URL
            - name: DM_RELAY_ASSISTANT_URL
              valueFrom:
                secretKeyRef:
                  name: device-management-secrets
                  key: DM_RELAY_ASSISTANT_URL
          volumeMounts:
            - name: dm-content
              mountPath: /data/content/binaries
            - name: dm-enroll
              mountPath: /data/enroll
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /livez
              port: 3001
            periodSeconds: 2
            failureThreshold: 15
            timeoutSeconds: 3
          readinessProbe:
            # /readyz is 503 until the runtime config has loaded once, so a pod
            # that cannot read its config is kept out of the Service (Stage 9).
            httpGet:
              path: /readyz
              port: 3001
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
      volumes:
        - name: dm-content
          persistentVolumeClaim:
            claimName: device-management-content-pvc
        - name: dm-enroll
          persistentVolumeClaim:
            claimName: device-management-enroll-pvc
