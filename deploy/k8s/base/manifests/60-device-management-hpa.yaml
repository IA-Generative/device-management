apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: device-management
  namespace: bootstrap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: device-management
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
