apiVersion: v1
kind: Secret
metadata:
  name: device-management-secrets
  namespace: bootstrap
type: Opaque
# CONVENTION (cf. NORMALIZATION-secrets.md) : ce fichier VERSIONNÉ ne doit contenir
# AUCUNE valeur secrète réelle. Les clés sensibles valent "<CHANGEME>" et sont fournies
# par le secret-patch.yaml GITIGNORED de chaque overlay (scaleway/dgx/local/prod-beta),
# posé APRÈS création du cluster. Les valeurs ci-dessous = config non sensible + défauts.
stringData:
  # App settings
  DM_APP_ENV: "prod"
  DM_CONFIG_ENABLED: "true"
  DM_CONFIG_PROFILE: "prod"
  DM_ENROLL_URL: "/bootstrap/enroll"
  DM_ALLOW_ORIGINS: "*"
  DM_MAX_BODY_SIZE_MB: "10"
  DM_PORT: "3001"
  DM_STORE_ENROLL_LOCALLY: "true"
  DM_ENROLL_DIR: "/data/enroll"
  DM_STORE_ENROLL_S3: "false"

  # Keycloak (k8s) — single source of truth for SSO URL
  # DM_AUTH_ISSUER_URL and ADMIN_OIDC_ISSUER_URL are derived automatically
  # from KEYCLOAK_ISSUER_URL + KEYCLOAK_REALM in the application code.
  KEYCLOAK_ISSUER_URL: "https://<SSO_PLACEHOLDER>"
  KEYCLOAK_REALM: "openwebui"
  KEYCLOAK_CLIENT_ID: "bootstrap-iassistant"
  # Défaut DEV uniquement (loopback desktop). DOIT être surchargé par overlay
  # (scaleway/dgx/local) avec l'URL de callback publique du flux bootstrap/LibreOffice.
  # Sinon le client sert un redirect_uri localhost → Keycloak rejette en prod.
  KEYCLOAK_REDIRECT_URI: "http://localhost:28443/callback"
  KEYCLOAK_ALLOWED_REDIRECT_URI: "http://localhost:28443/callback"
  ADMIN_REQUIRED_GROUP: "admin-dm"
  # Optional: override OIDC issuer for server-side calls (e.g. via internal proxy)
  # Leave empty to auto-derive from KEYCLOAK_ISSUER_URL + KEYCLOAK_REALM
  ADMIN_OIDC_ISSUER_URL: ""
  ADMIN_OIDC_PUBLIC_ISSUER_URL: ""
  DM_AUTH_VERIFY_ACCESS_TOKEN: "true"
  DM_AUTH_JWKS_URL: "http://relay-assistant/keycloak/protocol/openid-connect/certs"
  DM_AUTH_AUDIENCE: ""
  DM_AUTH_ALLOWED_ALGORITHMS_CSV: "RS256"
  DM_AUTH_LEEWAY_SECONDS: "30"
  DM_AUTH_JWKS_CACHE_TTL_SECONDS: "600"
  DM_QUEUE_ADMIN_TOKEN: "<CHANGEME>"          # secret — fourni par overlay
  DM_S3_BUCKET: "bootstrap"
  DM_S3_PREFIX_ENROLL: "enroll/"
  DM_S3_PREFIX_BINARIES: "binaries/"
  DM_BINARIES_MODE: "local"
  DM_PRESIGN_TTL_SECONDS: "300"
  DM_S3_ENDPOINT_URL: ""

  # Config template placeholders
  PUBLIC_BASE_URL: "https://<SCALEWAY_HOSTNAME>"
  LLM_API_TOKEN: "<CHANGEME>"                 # secret — fourni par overlay (À ROTATIONNER, exposé en historique)
  LLM_BASE_URL: "https://api.scaleway.ai/a9158aac-8404-46ea-8bf5-1ca048cd6ab4/v1"
  DEFAULT_MODEL_NAME: "gpt-oss-120b"

  # Tokens consommés par le template de l'extension navigateur (DM-2).
  # DOIVENT être renseignés (valeur réelle) par overlay — vides ⇒ token vide au runtime.
  API_BASE: ""
  RELAY_ASSISTANT_BASE_URL: ""
  COMPTE_RENDU_URL: ""
  COMU_URL: ""
  TELEMETRY_ENDPOINT: ""

  TELEMETRY_SALT: ""
  TELEMETRY_KEY: ""
  DM_TELEMETRY_ENABLED: "true"
  DM_TELEMETRY_PUBLIC_ENDPOINT: "/telemetry/v1/traces"
  DM_TELEMETRY_AUTHORIZATION_TYPE: "Bearer"
  DM_TELEMETRY_UPSTREAM_ENDPOINT: "http://otel-collector.telemetry.svc.cluster.local:4318/v1/traces"
  DM_TELEMETRY_UPSTREAM_AUTH_TYPE: "Bearer"
  DM_TELEMETRY_UPSTREAM_KEY: "<CHANGEME>"     # secret — fourni par overlay (À ROTATIONNER)
  DM_TELEMETRY_TOKEN_TTL_SECONDS: "300"
  DM_TELEMETRY_TOKEN_SIGNING_KEY: "<CHANGEME>"  # secret — fourni par overlay (À ROTATIONNER)
  DM_TELEMETRY_REQUIRE_TOKEN: "true"
  DM_TELEMETRY_MAX_BODY_SIZE_MB: "2"
  DM_TELEMETRY_GRAFANA_URL: "https://<TELEMETRY_PLACEHOLDER>/d/plugin-usage-telemetry"

  # Database
  POSTGRES_DB: bootstrap
  POSTGRES_USER: postgres
  # secret — fourni par overlay. NE PAS rotationner sans migration de la base existante
  # (le PVC postgres a déjà été initialisé avec le mot de passe courant).
  POSTGRES_PASSWORD: "<CHANGEME>"
  DATABASE_URL: "postgresql://dev:<CHANGEME>@postgres:5432/bootstrap"
  DATABASE_ADMIN_URL: "postgresql://postgres:<CHANGEME>@postgres:5432/postgres"

  # AWS (S3 auth)
  AWS_REGION: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_SESSION_TOKEN: ""
  AWS_DEFAULT_ORGANIZATION_ID: ""
  AWS_DEFAULT_PROJECT_ID: ""

  # Relay auth / proxy
  DM_RELAY_ENABLED: "true"
  DM_RELAY_KEY_TTL_SECONDS: "2592000"
  DM_RELAY_ALLOWED_TARGETS_CSV: "keycloak,config,llm,mcr-api,telemetry"
  DM_RELAY_REQUIRE_KEY_FOR_SECRETS: "true"
  DM_RELAY_PROXY_SHARED_TOKEN: "<CHANGEME>"   # secret — fourni par overlay
  DM_RELAY_SECRET_PEPPER: "<CHANGEME>"        # secret — fourni par overlay
  DM_RELAY_ASSISTANT_URL: "http://relay-assistant"

  # Relay upstream whitelist
  # RELAY_KEYCLOAK_UPSTREAM must equal KEYCLOAK_ISSUER_URL/realms/KEYCLOAK_REALM
  # (nginx templates cannot compute this, so it is kept explicit)
  RELAY_KEYCLOAK_UPSTREAM: "https://<SSO_PLACEHOLDER>/realms/openwebui"
  RELAY_LLM_UPSTREAM: "https://api.scaleway.ai/a9158aac-8404-46ea-8bf5-1ca048cd6ab4/v1"
  RELAY_MCR_API_UPSTREAM: "https://<MCR_PLACEHOLDER>"
  RELAY_COMPTE_RENDU_UPSTREAM: "https://compte-rendu.example.com"
