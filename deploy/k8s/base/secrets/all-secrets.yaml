apiVersion: v1
kind: Secret
metadata:
  name: device-management-secrets
  namespace: bootstrap
type: Opaque
stringData:
  # App settings
  DM_APP_ENV: "prod"
  DM_CONFIG_ENABLED: "true"
  DM_CONFIG_PROFILE: "prod"
  DM_ENROLL_URL: "/bootstrap/enroll"
  DM_ALLOW_ORIGINS: "*"
  DM_MAX_BODY_SIZE_MB: "10"
  DM_PORT: "3001"
  DM_STORE_ENROLL_LOCALLY: "true"
  DM_ENROLL_DIR: "/data/enroll"
  DM_STORE_ENROLL_S3: "false"

  # Keycloak (k8s)
  KEYCLOAK_ISSUER_URL: "https://sso.mirai.interieur.gouv.fr/"
  KEYCLOAK_REALM: "mirai"
  KEYCLOAK_CLIENT_ID: "bootstrap-iassistant"
  KEYCLOAK_REDIRECT_URI: "http://localhost:28443/callback"
  KEYCLOAK_ALLOWED_REDIRECT_URI: "http://localhost:28443/callback"
  DM_AUTH_VERIFY_ACCESS_TOKEN: "true"
  DM_AUTH_ISSUER_URL: "https://sso.mirai.interieur.gouv.fr/realms/mirai"
  DM_AUTH_JWKS_URL: "http://relay-assistant/keycloak/protocol/openid-connect/certs"
  DM_AUTH_AUDIENCE: ""
  DM_AUTH_ALLOWED_ALGORITHMS_CSV: "RS256"
  DM_AUTH_LEEWAY_SECONDS: "30"
  DM_AUTH_JWKS_CACHE_TTL_SECONDS: "600"
  DM_QUEUE_ADMIN_TOKEN: "change-me-queue-admin-token"
  DM_S3_BUCKET: "bootstrap"
  DM_S3_PREFIX_ENROLL: "enroll/"
  DM_S3_PREFIX_BINARIES: "binaries/"
  DM_BINARIES_MODE: "local"
  DM_PRESIGN_TTL_SECONDS: "300"
  DM_S3_ENDPOINT_URL: ""

  # Config template placeholders
  PUBLIC_BASE_URL: "https://onyxia.gpu.minint.fr/bootstrap"
  LLM_API_TOKEN: "sk-token"
  LLM_BASE_URL: "https://api.gpu.minint.fr/v1/"

  MODELNAME1: ""
  MODELNAME2: ""
  MODELNAME3: ""
  TOKENMODEL1: ""
  TOKENMODEL2: ""
  TOKENMODEL3: ""
  TELEMETRY_URL: ""
  TELEMETRY_SALT: ""
  TELEMETRY_KEY: ""
  TELEMETRY_AUTHTYPE: ""
  DM_TELEMETRY_ENABLED: "true"
  DM_TELEMETRY_PUBLIC_ENDPOINT: "/telemetry/v1/traces"
  DM_TELEMETRY_AUTHORIZATION_TYPE: "Bearer"
  DM_TELEMETRY_UPSTREAM_ENDPOINT: "https://telemetry.minint.fr/v1/traces"
  DM_TELEMETRY_UPSTREAM_AUTH_TYPE: "Bearer"
  DM_TELEMETRY_UPSTREAM_KEY: ""
  DM_TELEMETRY_TOKEN_TTL_SECONDS: "300"
  DM_TELEMETRY_TOKEN_SIGNING_KEY: "change-me-strong-random-signing-key"
  DM_TELEMETRY_REQUIRE_TOKEN: "true"
  DM_TELEMETRY_MAX_BODY_SIZE_MB: "2"

  # Database
  POSTGRES_DB: bootstrap
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://dev:dev@postgres:5432/bootstrap
  DATABASE_ADMIN_URL: postgresql://postgres:postgres@postgres:5432/postgres

  # AWS (S3 auth)
  AWS_REGION: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_SESSION_TOKEN: ""
  AWS_DEFAULT_ORGANIZATION_ID: ""
  AWS_DEFAULT_PROJECT_ID: ""

  # Relay auth / proxy
  DM_RELAY_ENABLED: "true"
  DM_RELAY_KEY_TTL_SECONDS: "2592000"
  DM_RELAY_ALLOWED_TARGETS_CSV: "keycloak,config,llm,mcr-api,telemetry"
  DM_RELAY_REQUIRE_KEY_FOR_SECRETS: "true"
  DM_RELAY_PROXY_SHARED_TOKEN: "change-me-relay-proxy-token"
  DM_RELAY_SECRET_PEPPER: "change-me-relay-secret-pepper"

  # Relay upstream whitelist
  RELAY_KEYCLOAK_UPSTREAM: "https://sso.mirai.interieur.gouv.fr/realms/mirai"
  RELAY_LLM_UPSTREAM: "https://api.gpu.minint.fr/v1"
  RELAY_MCR_API_UPSTREAM: "https://mcr-api.fake-domain.name"

---
