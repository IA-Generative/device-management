# =============================================================================
# WORKAROUND — DGX clock skew (libfaketime — bibliothèque pré-staged)
# =============================================================================
# Cette ConfigMap embarque libfaketimeMT.so.1 en binaire (extrait du paquet
# Debian `libfaketime_0.9.10-2.1_amd64`). On la monte en read-only dans
# chaque pod Python pour que LD_PRELOAD puisse la charger sans aucun
# téléchargement runtime.
#
# Pourquoi pas un `apt install` au démarrage : le proxy DGX (squid ORION)
# exige une auth Digest/Basic qu'on ne possède pas, donc apt-get échoue en
# 407 — y compris en HTTPS. Pré-staging via binaryData évite tout réseau.
#
# Architecture : amd64 / glibc — compatible avec l'image `device-management`
# basée sur python:3.12-slim (Debian).
#
# Voir CLOCK-SKEW-WORKAROUND.md pour le contexte complet.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: clock-skew-libfaketime
  namespace: bootstrap
binaryData:
  libfaketime.so.1: 
