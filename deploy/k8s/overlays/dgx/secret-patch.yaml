apiVersion: v1
kind: Secret
metadata:
  name: device-management-secrets
  namespace: bootstrap
stringData:
  PUBLIC_BASE_URL: "https://<INTERNAL_DOMAIN>/bootstrap"
  DM_ENROLL_URL: "/bootstrap/enroll"

  # Keycloak — realm mirai on <INTERNAL_DOMAIN>
  # On DGX, pods have outbound access via corporate proxy to .gouv.fr,
  # so server-side calls go directly (no WireGuard like on Scaleway).
  KEYCLOAK_ISSUER_URL: "https://<INTERNAL_DOMAIN>"
  KEYCLOAK_REALM: "mirai"
  KEYCLOAK_CLIENT_ID: "bootstrap-iassistant"
  ADMIN_REQUIRED_GROUP: "/g/Iassistant-Device-management"

  # Callback OIDC flux bootstrap/LibreOffice (client bootstrap-iassistant).
  # TODO ops DGX: confirmer l'hôte — SSO (ci-dessous) vs bootstrap onyxia/bootstrap.
  KEYCLOAK_REDIRECT_URI: "https://<INTERNAL_DOMAIN>/callback"
  KEYCLOAK_ALLOWED_REDIRECT_URI: "https://<INTERNAL_DOMAIN>/callback"

  # OIDC for admin UI : both server-side and browser-facing point to the same
  # public sso.mirai URL (DGX has direct egress to it via proxy).
  ADMIN_OIDC_ISSUER_URL: "https://<INTERNAL_DOMAIN>/realms/mirai"
  ADMIN_OIDC_PUBLIC_ISSUER_URL: "https://<INTERNAL_DOMAIN>/realms/mirai"
  ADMIN_OIDC_REDIRECT_URI: "https://<INTERNAL_DOMAIN>/admin/callback"

  DM_AUTH_JWKS_URL: "https://<INTERNAL_DOMAIN>/realms/mirai/protocol/openid-connect/certs"

  # Relay upstreams (used by relay-assistant nginx → external services)
  RELAY_KEYCLOAK_UPSTREAM: "https://<INTERNAL_DOMAIN>/realms/mirai"
  RELAY_COMPTE_RENDU_UPSTREAM: "https://<INTERNAL_DOMAIN>"
  DM_RELAY_ALLOWED_TARGETS_CSV: "keycloak,config,llm,mcr-api,telemetry,compte-rendu"

  # LLM — local DGX inference API (<INTERNAL_DOMAIN> is on the internal network,
  # bypasses the corporate proxy via no_proxy=<INTERNAL_DOMAIN>)
  LLM_BASE_URL: "https://<INTERNAL_DOMAIN>/v1"
  RELAY_LLM_UPSTREAM: "https://<INTERNAL_DOMAIN>/v1"

  # Unused on DGX — override base placeholders
  DM_TELEMETRY_GRAFANA_URL: ""
  RELAY_MCR_API_UPSTREAM: ""
