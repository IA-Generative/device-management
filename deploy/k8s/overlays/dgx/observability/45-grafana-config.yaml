apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: bootstrap
data:
  # Datasource Tempo auto-provisionnée au démarrage (pas de clic manuel).
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        isDefault: true
        jsonData:
          # Pas de corrélation logs/metrics (pas de Loki/Prometheus sur DGX).
          nodeGraph:
            enabled: true
