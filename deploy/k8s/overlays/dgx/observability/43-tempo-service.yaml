apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: bootstrap
spec:
  selector:
    app: tempo
  ports:
    # Query API (Grafana datasource).
    - name: http
      port: 3200
      targetPort: 3200
    # OTLP/HTTP ingest (telemetry-relay → ici).
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
  type: ClusterIP
