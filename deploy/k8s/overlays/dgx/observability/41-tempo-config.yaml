apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: bootstrap
data:
  # Tempo monolithique (single binary), stockage local sur PVC.
  # Reçoit l'OTLP directement du telemetry-relay (pas d'otel-collector).
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        # Rétention des traces : 14 jours.
        block_retention: 336h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal

    # Air-gap : pas de phone-home.
    usage_report:
      reporting_enabled: false
