# =============================================================================
# WORKAROUND — DGX clock skew (libfaketime)
# =============================================================================
# Le node hôte du DGX dérive ~+462s par rapport à UTC (NTP UDP/123 bloqué,
# pas d'accès SSH au node, proxy HTTP avec auth qu'on n'a pas).
#
# Ce patch monte libfaketime.so.1 (pré-staged via la ConfigMap
# `clock-skew-libfaketime`) et active LD_PRELOAD côté process Python.
#
# Pas d'init container — la lib est livrée avec le manifest, donc aucun
# téléchargement runtime, aucune dépendance réseau.
#
# Mettre à jour FAKETIME en re-mesurant périodiquement la dérive — voir
# CLOCK-SKEW-WORKAROUND.md (même répertoire).
# Retirer ce patch dès que le NTP hôte est corrigé.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-management
  namespace: bootstrap
spec:
  template:
    spec:
      containers:
        - name: device-management
          env:
            # WORKAROUND clock skew DGX — voir CLOCK-SKEW-WORKAROUND.md
            - name: LD_PRELOAD
              value: /faketime/libfaketime.so.1
            - name: FAKETIME
              value: "-462"
            - name: FAKETIME_DONT_FAKE_MONOTONIC
              value: "1"
            - name: FAKETIME_NO_CACHE
              value: "1"
          volumeMounts:
            - name: libfaketime
              mountPath: /faketime
              readOnly: true
      volumes:
        - name: libfaketime
          configMap:
            name: clock-skew-libfaketime
            defaultMode: 0644
