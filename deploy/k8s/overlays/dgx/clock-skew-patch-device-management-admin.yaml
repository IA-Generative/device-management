# =============================================================================
# WORKAROUND — DGX clock skew (libfaketime)
# Voir CLOCK-SKEW-WORKAROUND.md pour le contexte complet.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-management-admin
  namespace: bootstrap
spec:
  template:
    spec:
      containers:
        - name: device-management-admin
          env:
            # WORKAROUND clock skew DGX — voir CLOCK-SKEW-WORKAROUND.md
            - name: LD_PRELOAD
              value: /faketime/libfaketime.so.1
            - name: FAKETIME
              value: "-462"
            - name: FAKETIME_DONT_FAKE_MONOTONIC
              value: "1"
            - name: FAKETIME_NO_CACHE
              value: "1"
          volumeMounts:
            - name: libfaketime
              mountPath: /faketime
              readOnly: true
      volumes:
        - name: libfaketime
          configMap:
            name: clock-skew-libfaketime
            defaultMode: 0644
