apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - httproute.yaml
  # WORKAROUND DGX clock skew — bibliothèque libfaketime pré-staged
  # (voir CLOCK-SKEW-WORKAROUND.md). À retirer quand le NTP hôte est OK.
  - clock-skew-libfaketime-configmap.yaml

# Override all images to pull from etiquet's DockerHub mirror
# (Scaleway registry was unreachable from DGX, DockerHub is accessible)
images:
  - name: <SCALEWAY_REGISTRY>/device-management
    newName: docker.io/etiquet/device-management
    newTag: "0.5.23"
  - name: nginx
    newName: docker.io/etiquet/nginx
    newTag: "1.27-alpine"
  - name: docker.io/library/postgres
    newName: docker.io/etiquet/postgres
    newTag: "16-alpine"
  - name: docker.io/library/adminer
    newName: docker.io/etiquet/adminer
    newTag: "4.8.1-standalone"

# DGX single node: 1 replica for all DM deployments
replicas:
  - name: device-management
    count: 1
  - name: queue-worker
    count: 1

patches:
  - path: secret-patch.yaml
  - path: proxy-patch-device-management.yaml
    target:
      kind: Deployment
      name: device-management
  - path: proxy-patch-relay-assistant.yaml
    target:
      kind: Deployment
      name: relay-assistant
  - path: proxy-patch-queue-worker.yaml
    target:
      kind: Deployment
      name: queue-worker
  - path: proxy-patch-device-management-admin.yaml
    target:
      kind: Deployment
      name: device-management-admin

  # WORKAROUND — DGX clock skew (libfaketime)
  # L'horloge du node hôte dérive (~+462s) faute de NTP joignable, et nous
  # n'avons pas SSH sur le node pour corriger. Ces 4 patches injectent
  # libfaketime via LD_PRELOAD dans tous les pods Python (image
  # device-management). À retirer dès que le NTP hôte est rétabli.
  # Détails complets : CLOCK-SKEW-WORKAROUND.md (même répertoire).
  - path: clock-skew-patch-device-management.yaml
    target:
      kind: Deployment
      name: device-management
  - path: clock-skew-patch-device-management-admin.yaml
    target:
      kind: Deployment
      name: device-management-admin
  - path: clock-skew-patch-telemetry-relay.yaml
    target:
      kind: Deployment
      name: telemetry-relay
  - path: clock-skew-patch-queue-worker.yaml
    target:
      kind: Deployment
      name: queue-worker
