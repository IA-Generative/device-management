apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-extras.yaml
  - wireguard-proxy.yaml

images:
  - name: <SCALEWAY_REGISTRY>/device-management
    newName: docker.io/<DOCKERHUB_NAMESPACE>/device-management
    newTag: "0.9.0"
  - name: nginx
    newName: docker.io/<DOCKERHUB_NAMESPACE>/nginx
    newTag: "1.29-alpine"
  - name: docker.io/library/postgres
    newName: docker.io/<DOCKERHUB_NAMESPACE>/postgres
    newTag: "16-alpine"

# RWO PVCs (sbs-default) ne supportent pas plusieurs replicas sur des nœuds
# différents. Forcer 1 replica pour device-management (calque DGX).
replicas:
  - name: device-management
    count: 1

patches:
  - path: env-secrets.yaml
  - path: hpa-patch.yaml
