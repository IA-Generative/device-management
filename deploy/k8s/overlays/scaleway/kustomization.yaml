apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-extras.yaml
  - wireguard-proxy.yaml

images:
  - name: <SCALEWAY_REGISTRY>/device-management
    newName: docker.io/etiquet/device-management
    newTag: "0.5.23"
  - name: nginx
    newName: docker.io/etiquet/nginx
    newTag: "1.27-alpine"
  - name: docker.io/library/postgres
    newName: docker.io/etiquet/postgres
    newTag: "16-alpine"
  - name: docker.io/library/adminer
    newName: docker.io/etiquet/adminer
    newTag: "4.8.1-standalone"

# RWO PVCs (sbs-default) ne supportent pas plusieurs replicas sur des nœuds
# différents. Forcer 1 replica pour device-management (calque DGX).
replicas:
  - name: device-management
    count: 1

patches:
  - path: env-secrets.yaml
  - path: hpa-patch.yaml
