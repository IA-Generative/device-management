---
# WireGuard egress proxy — tunnels HTTPS traffic to sso.mirai.interieur.gouv.fr
# through a WireGuard VPN.  Other pods reach the SSO via this service:
#   http://wireguard-proxy/  →  nginx  →  wg0 tunnel  →  sso.mirai.interieur.gouv.fr
#
# The pod runs:
#   1. WireGuard sidecar (alpine + wireguard-tools) maintaining the wg0 tunnel
#   2. An nginx reverse-proxy that listens on :8443 and forwards to the SSO
# ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: wireguard-proxy-nginx
  namespace: bootstrap
data:
  default.conf: |
    server {
      listen 8443;
      server_name _;

      # SSO internal IP on VPN (resolved via VPN DNS: 172.16.248.240)
      # Using IP directly to avoid DNS resolution issues in nginx.
      location / {
        proxy_pass https://172.16.248.240;
        proxy_ssl_server_name on;
        proxy_ssl_name sso.mirai.interieur.gouv.fr;
        proxy_ssl_verify off;
        proxy_set_header Host sso.mirai.interieur.gouv.fr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_connect_timeout 10;
        proxy_read_timeout 30;
      }

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard-proxy
  namespace: bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard-proxy
  template:
    metadata:
      labels:
        app: wireguard-proxy
    spec:
      containers:
        # ── WireGuard tunnel (alpine + wg-tools) ──
        - name: wireguard
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache wireguard-tools iptables ip6tables
              mkdir -p /etc/wireguard
              cp /wg-secret/wg0.conf /etc/wireguard/wg0.conf
              chmod 600 /etc/wireguard/wg0.conf
              wg-quick up wg0
              echo "WireGuard tunnel active"
              wg show wg0
              # Keep alive and monitor
              while true; do
                if ! wg show wg0 >/dev/null 2>&1; then
                  echo "wg0 down, restarting..."
                  wg-quick down wg0 2>/dev/null || true
                  wg-quick up wg0
                fi
                sleep 30
              done
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          volumeMounts:
            - name: wg-config
              mountPath: /wg-secret
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        # ── Nginx reverse proxy ──
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      volumes:
        - name: wg-config
          secret:
            secretName: wireguard-config
            defaultMode: 384
        - name: nginx-config
          configMap:
            name: wireguard-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: wireguard-proxy
  namespace: bootstrap
spec:
  selector:
    app: wireguard-proxy
  ports:
    - port: 80
      targetPort: 8443
      protocol: TCP
      name: http
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
