---
# WireGuard egress proxy — tunnels HTTPS traffic to <SSO_HOSTNAME>
# through a WireGuard VPN.  Other pods reach the SSO via this service:
#   http://wireguard-proxy/  →  nginx  →  wg0 tunnel  →  <SSO_HOSTNAME>
#
# The pod runs:
#   1. WireGuard sidecar (alpine + wireguard-tools) maintaining the wg0 tunnel
#   2. An nginx reverse-proxy that listens on :8443 and forwards to the SSO
# ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: wireguard-proxy-nginx
  namespace: bootstrap
data:
  default.conf: |
    # Pool de connexions keepalive vers le SSO : évite de rouvrir une connexion
    # TLS neuve à travers le tunnel WireGuard à chaque requête (handshake à froid
    # ~7-10s). Sans ça, le 1er fetch JWKS du device-management dépassait
    # proxy_connect_timeout (10s) → 504 → token non vérifiable → /enroll 401.
    upstream sso_keycloak {
      server 172.16.248.240:443;
      keepalive 16;
      keepalive_timeout 3600s;
      keepalive_requests 10000;
    }
    server {
      listen 8443;
      server_name _;

      # SSO internal IP on VPN (resolved via VPN DNS: 172.16.248.240)
      # Using IP directly to avoid DNS resolution issues in nginx.
      location / {
        proxy_pass https://sso_keycloak;
        proxy_ssl_server_name on;
        proxy_ssl_name sso.mirai.interieur.gouv.fr;
        proxy_ssl_verify off;
        proxy_set_header Host sso.mirai.interieur.gouv.fr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60;
        proxy_read_timeout 60;
      }

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard-proxy
  namespace: bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard-proxy
  template:
    metadata:
      labels:
        app: wireguard-proxy
    spec:
      containers:
        # ── WireGuard tunnel (alpine + wg-tools) ──
        - name: wireguard
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache wireguard-tools iptables ip6tables
              mkdir -p /etc/wireguard
              cp /wg-secret/wg0.conf /etc/wireguard/wg0.conf
              chmod 600 /etc/wireguard/wg0.conf
              wg-quick up wg0
              echo "WireGuard tunnel active"
              wg show wg0
              # Keep alive and monitor
              while true; do
                if ! wg show wg0 >/dev/null 2>&1; then
                  echo "wg0 down, restarting..."
                  wg-quick down wg0 2>/dev/null || true
                  wg-quick up wg0
                fi
                sleep 30
              done
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          volumeMounts:
            - name: wg-config
              mountPath: /wg-secret
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        # ── Nginx reverse proxy ──
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      volumes:
        - name: wg-config
          secret:
            secretName: wireguard-config
            defaultMode: 384
        - name: nginx-config
          configMap:
            name: wireguard-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: wireguard-proxy
  namespace: bootstrap
spec:
  selector:
    app: wireguard-proxy
  ports:
    - port: 80
      targetPort: 8443
      protocol: TCP
      name: http
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
---
# Keycloak warmer — pod séparé (réseau cluster normal, contrairement au pod
# wireguard-proxy dont le netns est verrouillé par le kill-switch WireGuard).
# Sollicite le JWKS via le service toutes les 20s pour garder le tunnel ET la
# connexion keepalive nginx→Keycloak chauds → le device-management ne paie
# jamais le cold-connect (~27s) lors de la vérification des tokens (/enroll).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-warmer
  namespace: bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-warmer
  template:
    metadata:
      labels:
        app: keycloak-warmer
    spec:
      containers:
        - name: warmer
          image: nginx:1.27-alpine
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                wget -q -T 55 -O /dev/null \
                  http://wireguard-proxy/realms/mirai/protocol/openid-connect/certs || true
                sleep 20
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 16Mi
