apiVersion: v1
kind: Secret
metadata:
  name: device-management-secrets
  namespace: bootstrap
stringData:
  PUBLIC_BASE_URL: "https://bootstrap.fake-domain.name"
  DM_ENROLL_URL: "/enroll"

  # Keycloak — realm mirai on sso.mirai.interieur.gouv.fr
  KEYCLOAK_ISSUER_URL: "https://sso.mirai.interieur.gouv.fr"
  KEYCLOAK_REALM: "mirai"
  KEYCLOAK_CLIENT_ID: "bootstrap-iassistant"
  ADMIN_REQUIRED_GROUP: "/g/Iassistant-Device-management"

  # Internal Keycloak URL (via WireGuard proxy in-cluster)
  # Browser-facing URLs stay on sso.mirai.interieur.gouv.fr
  # Server-side calls go through the wireguard-proxy service
  ADMIN_OIDC_ISSUER_URL: "http://wireguard-proxy/realms/mirai"
  ADMIN_OIDC_PUBLIC_ISSUER_URL: "https://sso.mirai.interieur.gouv.fr/realms/mirai"
  DM_AUTH_JWKS_URL: "http://wireguard-proxy/realms/mirai/protocol/openid-connect/certs"

  # Relay upstream (via WireGuard proxy)
  RELAY_KEYCLOAK_UPSTREAM: "http://wireguard-proxy/realms/mirai"

  # LLM — Scaleway API
  LLM_API_TOKEN: "17f16fa6-6199-44e1-9d7e-cf56499cd15f"
  LLM_BASE_URL: "https://api.scaleway.ai/a9158aac-8404-46ea-8bf5-1ca048cd6ab4/v1"
  DEFAULT_MODEL_NAME: "deepseek-r1-distill-llama-70b"
  RELAY_LLM_UPSTREAM: "https://api.scaleway.ai/a9158aac-8404-46ea-8bf5-1ca048cd6ab4/v1"
