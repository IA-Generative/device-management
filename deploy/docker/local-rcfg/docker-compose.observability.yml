# Local Tempo + Grafana (separate observability stack) for device-management.
# Joins the external owui-net so the DM relays traces to tempo:4318.
# Grafana UI on http://localhost:3030 (anonymous admin, embedding allowed).
# Survives reboot: restart: unless-stopped + named volumes.
services:
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks: [owui-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/tempo.yml:ro
      - grafana_data:/var/lib/grafana
    depends_on: [tempo]
    networks: [owui-net]
    restart: unless-stopped

networks:
  owui-net:
    external: true

volumes:
  tempo_data:
  grafana_data:
